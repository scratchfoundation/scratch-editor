name: Test package

description: Test one of the packages in this monorepo.

inputs:
  package_name:
    description: The name of the tested package
    required: true

runs:
  using: composite
  steps:
    - name: Install Playwright
      if: ${{ inputs.package_name == 'scratch-render' || inputs.package_name == 'scratch-gui' }}
      shell: bash
      # Install both browsers for any package that needs Playwright,
      # even if a particular package only uses one of them — keeping
      # the install step uniform is much simpler than maintaining a
      # per-package browser list, and Firefox in scratch-render is
      # cheap unused weight rather than a correctness problem.
      run: npx playwright install --with-deps chromium firefox
    - name: Test
      working-directory: ./packages/${{ inputs.package_name }}
      shell: bash
      env:
        TAP_REPORTER: "junit"
        TAP_REPORTER_FILE: "test-results/junit.xml"
      run: |
        mkdir -p test-results
        npm run test
    - name: Publish test reports
      if: ${{ !cancelled() }}
      uses: EnricoMi/publish-unit-test-result-action@34d7c956a59aed1bfebf31df77b8de55db9bbaaf # v2
      with:
        # Exclude Playwright's HTML report and per-test artifact
        # directories. Without these exclusions the action would try to
        # parse HTML, CSS, JS, PNG, JSON, etc. as test result files.
        #
        # We exclude by directory rather than by file extension because
        # the action supports JSON test results (Dart, Mocha) and
        # Playwright also writes .json files (e.g. .last-run.json) —
        # extension-based exclusion would either break JSON test report
        # support or let Playwright metadata through to the parser.
        files: |
          ./packages/${{ inputs.package_name }}/test-results/**/*
          !./packages/${{ inputs.package_name }}/test-results/playwright-html/**
          !./packages/${{ inputs.package_name }}/test-results/playwright-artifacts/**
        check_name: "Test report for ${{ inputs.package_name }}"
        test_file_prefix: "+packages/${{ inputs.package_name }}/"
    - name: Store Test Results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        name: ${{ inputs.package_name }}-test-output
        path: ./packages/${{ inputs.package_name }}/test-results/*
